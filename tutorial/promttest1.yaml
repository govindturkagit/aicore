name: multi_task_prompt
version: 1.1.0
apiVersion: argoproj.io/v1alpha
kind: PromptTemplate
scenario: multi-task-processing
spec:
  template:
    - role: "system"
      content: "{{ ?instruction }}"
    - role: "user"
      content: "Take {{ ?user_input }} from here"
  defaults:
    instruction: "default instruction"
    user_input: "default user input"
  additionalFields:
    isDev: true
    validations:
      required: true
    blockedModels:
      - name: "gpt-4"
        versions: "gpt-4-vision"
      - name: "gpt-4o"
        versions: "*"
